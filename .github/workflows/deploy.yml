name: Build and Deploy to Nuget

on:
  push:
    branches: [ main ]  # Trigger on push to main; adjust as needed

permissions:
  id-token: write
  contents: write   # Required for tagging and releasing
  packages: write  # Required for pushing to GHCR
  pull-requests: read  # Required for label-based overrides

jobs: 
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive  # This enables recursive submodule checkout
          fetch-depth: 0  # Fetch all history for accurate versioning
 
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x     # or 9.0.x, adjust as needed

      - name: Restore dependencies
        run: dotnet restore "Molecule/Molecule.csproj"

      - name: Build
        run: dotnet build "Molecule/Molecule.csproj" --configuration Release --no-restore

      - name: Test
        run: dotnet test "Molecule/Molecule.csproj" --verbosity normal

      - name: Create Tag and Release
        id: release
        uses: rymndhng/release-on-push-action@v0.28.0  # Pin to a version for stability
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          bump_version_scheme: minor  # Default: minor; options: major, patch, norelease
          tag_prefix: v  # Prefix for tags, e.g., v1.2.3
          release_name: "<RELEASE_VERSION>"  # Release title format
          use_github_release_notes: true  # Use GitHub's auto-generated notes
          max_commits: 50  # Limit notes to recent commits

      - name: Log Release Info
        run: |
          echo "Created tag: ${{ steps.release.outputs.tag_name }}"
          echo "Release URL: ${{ steps.release.outputs.html_url }}"
          echo "Version: ${{ steps.release.outputs.version }}"

      - name: Update version
        if: steps.release.outputs.tag_name != ''
        run: |
          sed -i 's|<Version>0\.0\.0</Version>|<Version>${{ steps.release.outputs.version }}</Version>|g'  ./Molecule/Molecule.csproj

      - name: Pack
        run: dotnet pack "Molecule/Molecule.csproj" --configuration Release --no-build -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg -o ./nupkgs
      
      - name: Publish to nuget.org
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate \
            --no-symbols false   # optional but clearer
        env:
          DOTNET_NOLOGO: true


